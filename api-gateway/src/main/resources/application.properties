server.port=8080

spring.application.name=api-gateway

# =========================================================
# EUREKA
# =========================================================
eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# =========================================================
# SPRINGDOC / SWAGGER
# =========================================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.cache.disabled=true

server.forward-headers-strategy=framework

# =========================================================
# SWAGGER DOC ROUTES
# =========================================================

spring.cloud.gateway.routes[0].id=auth-docs
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].order=-1
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/v3/api-docs
spring.cloud.gateway.routes[0].filters[0]=SetPath=/v3/api-docs

spring.cloud.gateway.routes[1].id=profile-docs
spring.cloud.gateway.routes[1].uri=lb://PROFILE-SERVICE
spring.cloud.gateway.routes[1].order=-1
spring.cloud.gateway.routes[1].predicates[0]=Path=/profiles/v3/api-docs
spring.cloud.gateway.routes[1].filters[0]=SetPath=/v3/api-docs

spring.cloud.gateway.routes[2].id=job-docs
spring.cloud.gateway.routes[2].uri=lb://JOB-SERVICE
spring.cloud.gateway.routes[2].order=-1
spring.cloud.gateway.routes[2].predicates[0]=Path=/jobs/v3/api-docs
spring.cloud.gateway.routes[2].filters[0]=SetPath=/v3/api-docs

spring.cloud.gateway.routes[3].id=application-docs
spring.cloud.gateway.routes[3].uri=lb://APPLICATION-SERVICE
spring.cloud.gateway.routes[3].order=-1
spring.cloud.gateway.routes[3].predicates[0]=Path=/applications/v3/api-docs
spring.cloud.gateway.routes[3].filters[0]=SetPath=/v3/api-docs

spring.cloud.gateway.routes[4].id=interview-docs
spring.cloud.gateway.routes[4].uri=lb://INTERVIEW-SERVICE
spring.cloud.gateway.routes[4].order=-1
spring.cloud.gateway.routes[4].predicates[0]=Path=/interviews/v3/api-docs
spring.cloud.gateway.routes[4].filters[0]=SetPath=/v3/api-docs

spring.cloud.gateway.routes[5].id=notification-docs
spring.cloud.gateway.routes[5].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.routes[5].order=-1
spring.cloud.gateway.routes[5].predicates[0]=Path=/notifications/v3/api-docs
spring.cloud.gateway.routes[5].filters[0]=SetPath=/v3/api-docs

spring.cloud.gateway.routes[6].id=subscription-docs
spring.cloud.gateway.routes[6].uri=lb://SUBSCRIPTION-SERVICE
spring.cloud.gateway.routes[6].order=-1
spring.cloud.gateway.routes[6].predicates[0]=Path=/subscriptions/v3/api-docs
spring.cloud.gateway.routes[6].filters[0]=SetPath=/v3/api-docs

spring.cloud.gateway.routes[7].id=analytics-docs
spring.cloud.gateway.routes[7].uri=lb://ANALYTICS-SERVICE
spring.cloud.gateway.routes[7].order=-1
spring.cloud.gateway.routes[7].predicates[0]=Path=/analytics/v3/api-docs
spring.cloud.gateway.routes[7].filters[0]=SetPath=/v3/api-docs

# =========================================================
# MAIN SERVICE ROUTES
# =========================================================

spring.cloud.gateway.routes[8].id=auth-service
spring.cloud.gateway.routes[8].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[8].order=1
spring.cloud.gateway.routes[8].predicates[0]=Path=/auth/**,/oauth2/**,/login/**
spring.cloud.gateway.routes[8].filters[0]=PreserveHostHeader

spring.cloud.gateway.routes[9].id=profile-service
spring.cloud.gateway.routes[9].uri=lb://PROFILE-SERVICE
spring.cloud.gateway.routes[9].order=1
spring.cloud.gateway.routes[9].predicates[0]=Path=/profiles/**

spring.cloud.gateway.routes[10].id=job-service
spring.cloud.gateway.routes[10].uri=lb://JOB-SERVICE
spring.cloud.gateway.routes[10].order=1
spring.cloud.gateway.routes[10].predicates[0]=Path=/jobs/**

spring.cloud.gateway.routes[11].id=application-service
spring.cloud.gateway.routes[11].uri=lb://APPLICATION-SERVICE
spring.cloud.gateway.routes[11].order=1
spring.cloud.gateway.routes[11].predicates[0]=Path=/applications/**

spring.cloud.gateway.routes[12].id=interview-service
spring.cloud.gateway.routes[12].uri=lb://INTERVIEW-SERVICE
spring.cloud.gateway.routes[12].order=1
spring.cloud.gateway.routes[12].predicates[0]=Path=/interviews/**

spring.cloud.gateway.routes[13].id=notification-service
spring.cloud.gateway.routes[13].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.routes[13].order=1
spring.cloud.gateway.routes[13].predicates[0]=Path=/notifications/**

spring.cloud.gateway.routes[14].id=subscription-service
spring.cloud.gateway.routes[14].uri=lb://SUBSCRIPTION-SERVICE
spring.cloud.gateway.routes[14].order=1
spring.cloud.gateway.routes[14].predicates[0]=Path=/subscriptions/**

spring.cloud.gateway.routes[15].id=analytics-service
spring.cloud.gateway.routes[15].uri=lb://ANALYTICS-SERVICE
spring.cloud.gateway.routes[15].order=1
spring.cloud.gateway.routes[15].predicates[0]=Path=/analytics/**

# =========================================================
# ACTUATOR
# =========================================================
management.endpoints.web.exposure.include=*
management.endpoint.gateway.access=unrestricted

# =========================================================
# SWAGGER UI SERVICE LIST
# =========================================================

springdoc.swagger-ui.urls[0].name=auth-service
springdoc.swagger-ui.urls[0].url=/auth/v3/api-docs

springdoc.swagger-ui.urls[1].name=profile-service
springdoc.swagger-ui.urls[1].url=/profiles/v3/api-docs

springdoc.swagger-ui.urls[2].name=job-service
springdoc.swagger-ui.urls[2].url=/jobs/v3/api-docs

springdoc.swagger-ui.urls[3].name=application-service
springdoc.swagger-ui.urls[3].url=/applications/v3/api-docs

springdoc.swagger-ui.urls[4].name=interview-service
springdoc.swagger-ui.urls[4].url=/interviews/v3/api-docs

springdoc.swagger-ui.urls[5].name=notification-service
springdoc.swagger-ui.urls[5].url=/notifications/v3/api-docs

springdoc.swagger-ui.urls[6].name=subscription-service
springdoc.swagger-ui.urls[6].url=/subscriptions/v3/api-docs

springdoc.swagger-ui.urls[7].name=analytics-service
springdoc.swagger-ui.urls[7].url=/analytics/v3/api-docs

# =========================================================
# JWT
# =========================================================
jwt.secret=${JWT_SECRET:hireconnect-super-secret-key-for-jwt-123456789-hireconnect-auth-service}

# =========================================================
# CORS
# =========================================================
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=${FRONTEND_URL:http://localhost:5173},http://localhost:4173,http://localhost:3000
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true

spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.x-forwarded.enabled=true