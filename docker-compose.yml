version: '3.8'

services:

  mysql:
    image: mysql:8
    container_name: hireconnect-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root123}
      MYSQL_DATABASE: hireconnectdb
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - hireconnect-network
    
  redis:
    image: redis:7
    container_name: hireconnect-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - hireconnect-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: hireconnect-elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - hireconnect-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: hireconnect-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - hireconnect-network

  discovery-server:
    build: ./discover-server
    container_name: hireconnect-discovery-server
    restart: always
    ports:
      - "8761:8761"
    environment:
      SPRING_APPLICATION_NAME: discovery-server
      EUREKA_INSTANCE_HOSTNAME: discovery-server
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    networks:
      - hireconnect-network

  auth-service:
    build: ./auth-service
    container_name: hireconnect-auth-service
    restart: always
    ports:
      - "8081:8081"
    environment:
      SPRING_APPLICATION_NAME: auth-service

      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-Ov23liSZyYkROmakVP1a}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-187f01d5f569679045636c46381ab5e61edd476e}

      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hireconnectdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-root123}

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: auth-service
      EUREKA_INSTANCE_NON_SECURE_PORT: 8081

      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest

      GATEWAY_URL: http://api-gateway:8080
      JWT_SECRET: ${JWT_SECRET:-hireconnect-super-secret-key-for-jwt-123456789-hireconnect-auth-service}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}

    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    networks:
      - hireconnect-network

  profile-service:
    build: ./profile-service
    container_name: hireconnect-profile-service
    restart: always
    ports:
      - "8082:8082"
    environment:
      SPRING_APPLICATION_NAME: profile-service
      SERVER_PORT: 8082

      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hireconnectdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-root123}

      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: profile-service
      EUREKA_INSTANCE_NON_SECURE_PORT: 8082

    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      discovery-server:
        condition: service_started
      auth-service:
        condition: service_started

    networks:
      - hireconnect-network

  job-service:
    build: ./job-service
    container_name: hireconnect-job-service
    restart: always
    ports:
      - "8083:8083"
    environment:
      SPRING_APPLICATION_NAME: job-service

      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hireconnectdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-root123}

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: job-service
      EUREKA_INSTANCE_NON_SECURE_PORT: 8083

      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200
      ELASTICSEARCH_URI: http://elasticsearch:9200

      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest

      JWT_SECRET: ${JWT_SECRET:-hireconnect-super-secret-key-for-jwt-123456789-hireconnect-auth-service}
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    networks:
      - hireconnect-network

  application-service:
    build: ./application-service
    container_name: hireconnect-application-service
    restart: always
    ports:
      - "8084:8084"
    environment:
      SPRING_APPLICATION_NAME: application-service

      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hireconnectdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-root123}

      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: application-service
      EUREKA_INSTANCE_NON_SECURE_PORT: 8084
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      discovery-server:
        condition: service_started
    networks:
      - hireconnect-network

  interview-service:
    build: ./interview-microservice
    container_name: hireconnect-interview-service
    restart: always
    ports:
      - "8085:8085"
    environment:
      SPRING_APPLICATION_NAME: interview-service
      SERVER_PORT: 8085

      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hireconnectdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-root123}

      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: interview-service
      EUREKA_INSTANCE_NON_SECURE_PORT: 8085
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      discovery-server:
        condition: service_started
      application-service:
        condition: service_started
    networks:
      - hireconnect-network

  notification-service:
    build: ./notification-service
    container_name: hireconnect-notification-service
    restart: always
    ports:
      - "8086:8086"
    environment:
      SPRING_APPLICATION_NAME: notification-service
      SERVER_PORT: 8086

      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hireconnectdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-root123}

      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME:-test@example.com}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD:-testpass123}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: true
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: true

      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: notification-service
      EUREKA_INSTANCE_NON_SECURE_PORT: 8086
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      discovery-server:
        condition: service_started
    networks:
      - hireconnect-network

  subscription-service:
    build: ./subscription-service
    container_name: hireconnect-subscription-service
    restart: always
    ports:
      - "8087:8087"
    environment:
      SPRING_APPLICATION_NAME: subscription-service
      SERVER_PORT: 8087

      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hireconnectdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-root123}

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: subscription-service
      EUREKA_INSTANCE_NON_SECURE_PORT: 8087

      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest

      SPRINGDOC_API_DOCS_PATH: /api-docs
      SPRINGDOC_SWAGGER_UI_PATH: /swagger-ui.html

      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_example_key_12345}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-pk_test_example_key_67890}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_example_webhook_secret}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-http://localhost/payment/success}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-http://localhost/payment/cancel}

      JWT_SECRET: ${JWT_SECRET:-hireconnect-super-secret-key-for-jwt-123456789-hireconnect-auth-service}

    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - hireconnect-network

  analytics-service:
    build: ./analytics-service
    container_name: hireconnect-analytics-service
    restart: always
    ports:
      - "8088:8088"
    environment:
      SPRING_APPLICATION_NAME: analytics-service
      SERVER_PORT: 8088

      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hireconnectdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-root123}

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: analytics-service
      EUREKA_INSTANCE_NON_SECURE_PORT: 8088

      SPRINGDOC_API_DOCS_PATH: /api-docs
      SPRINGDOC_SWAGGER_UI_PATH: /swagger-ui.html

    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_started
      job-service:
        condition: service_started
      application-service:
        condition: service_started
    networks:
      - hireconnect-network

  hireconnect-web:
    build: ./hireconnect-web
    container_name: hireconnect-web
    restart: always
    ports:
      - "8089:8089"
    environment:
      SPRING_APPLICATION_NAME: hireconnect-web
      SERVER_PORT: 8089

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: hireconnect-web
      EUREKA_INSTANCE_NON_SECURE_PORT: 8089

      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-Ov23liSZyYkROmakVP1a}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-187f01d5f569679045636c46381ab5e61edd476e}

    depends_on:
      discovery-server:
        condition: service_started
      auth-service:
        condition: service_started
      profile-service:
        condition: service_started
      job-service:
        condition: service_started
      application-service:
        condition: service_started
      interview-service:
        condition: service_started
      notification-service:
        condition: service_started
      subscription-service:
        condition: service_started
      analytics-service:
        condition: service_started
    networks:
      - hireconnect-network

  api-gateway:
    build: ./api-gateway
    container_name: hireconnect-api-gateway
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_APPLICATION_NAME: api-gateway
      SERVER_PORT: 8080

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: api-gateway
      EUREKA_INSTANCE_NON_SECURE_PORT: 8080

      JWT_SECRET: ${JWT_SECRET:-hireconnect-super-secret-key-for-jwt-123456789-hireconnect-auth-service}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-Ov23liSZyYkROmakVP1a}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-187f01d5f569679045636c46381ab5e61edd476e}

    depends_on:
      discovery-server:
        condition: service_started
      auth-service:
        condition: service_started
      profile-service:
        condition: service_started
      job-service:
        condition: service_started
      application-service:
        condition: service_started
      interview-service:
        condition: service_started
      notification-service:
        condition: service_started
      subscription-service:
        condition: service_started
      analytics-service:
        condition: service_started

    networks:
      - hireconnect-network

  frontend:
    build: ../HireConnect-Frontend
    container_name: hireconnect-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - hireconnect-network

volumes:
  mysql-data:
  elasticsearch-data:

networks:
  hireconnect-network:
    driver: bridge