services:
  mysql:
    image: mysql:8
    container_name: hireconnect-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: hireconnect_auth
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  discovery-server:
    build: ./discover-server
    container_name: hireconnect-discovery-server
    ports:
      - "8761:8761"

  auth-service:
    build: ./auth-service
    container_name: hireconnect-auth-service
    ports:
      - "8081:8081"
    environment:
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_started

  profile-service:
    build: ./profile-service
    container_name: hireconnect-profile-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/hireconnectdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://host.docker.internal:8761/eureka/
    depends_on:
      discovery-server:
        condition: service_started
    restart: always
    
  job-service:
    build: ./job-service
    container_name: hireconnect-job-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/hireconnectdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://host.docker.internal:8761/eureka/
    depends_on:
      discovery-server:
        condition: service_started
    restart: always