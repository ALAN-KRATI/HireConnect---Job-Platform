<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Profile</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h1>My Profile</h1>

    <div class="card">
        <h2 th:text="${profile.fullName}"></h2>
        <p><strong>Email:</strong> <span th:text="${profile.email}"></span></p>
        <p><strong>Phone:</strong> <span th:text="${profile.phone}"></span></p>
        <p><strong>Location:</strong> <span th:text="${profile.location}"></span></p>
        <p><strong>Skills:</strong> <span th:text="${profile.skills}"></span></p>
        <p><strong>Wallet:</strong> ₹<span th:text="${profile.walletBalance}"></span></p>
    </div>
</div>
</body>
</html>
