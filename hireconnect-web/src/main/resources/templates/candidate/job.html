<!-- candidate/jobs.html -->
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Jobs | HireConnect</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="dashboard-layout">

    <aside class="sidebar">
        <h2>HireConnect</h2>

        <nav>
            <a th:href="@{/candidate/home}">
                <i class="fas fa-house"></i> Home
            </a>

            <a th:href="@{/candidate/jobs}" class="active">
                <i class="fas fa-briefcase"></i> Jobs
            </a>

            <a th:href="@{/candidate/applications}">
                <i class="fas fa-file-lines"></i> Applications
            </a>

            <a th:href="@{/candidate/profile}">
                <i class="fas fa-user"></i> Profile
            </a>

            <a th:href="@{/logout}">
                <i class="fas fa-right-from-bracket"></i> Logout
            </a>
        </nav>
    </aside>

    <main class="page-content">

        <div class="page-header">
            <h1>Available Jobs</h1>
            <p>Fresh opportunities. Slightly less fresh existential dread.</p>
        </div>

        <div class="jobs-grid">

            <div class="job-card" th:each="job : ${jobs}">

                <div class="job-header">
                    <h2 th:text="${job.title}">Backend Developer</h2>
                    <span class="job-type"
                          th:text="${job.employmentType}">
                        FULL_TIME
                    </span>
                </div>

                <p class="company">
                    <i class="fas fa-building"></i>
                    <span th:text="${job.companyName}">HireConnect</span>
                </p>

                <p class="location">
                    <i class="fas fa-location-dot"></i>
                    <span th:text="${job.location}">Remote</span>
                </p>

                <p class="salary">
                    <i class="fas fa-indian-rupee-sign"></i>
                    <span th:text="${job.salary}">1200000</span>
                </p>

                <p class="description"
                   th:text="${job.description}">
                    Job description goes here...
                </p>

                <div class="job-actions">

                    <form th:action="@{'/candidate/jobs/' + ${job.id} + '/apply'}"
                          method="post">
                        <button type="submit" class="btn-primary">
                            <i class="fas fa-paper-plane"></i>
                            Apply
                        </button>
                    </form>

                    <form th:action="@{'/candidate/jobs/' + ${job.id} + '/bookmark'}"
                          method="post">
                        <button type="submit" class="btn-secondary">
                            <i class="fas fa-bookmark"></i>
                            Save
                        </button>
                    </form>

                </div>

            </div>

        </div>

    </main>
</div>

</body>
</html>
