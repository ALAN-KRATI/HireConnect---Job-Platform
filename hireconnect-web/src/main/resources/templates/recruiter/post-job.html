<!-- templates/recruiter/post-job.html -->
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Job | HireConnect</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="dashboard-page">

<div class="dashboard-layout">

    <aside class="sidebar">

        <div class="sidebar-top">

            <div class="brand-section">
                <div class="logo-circle">HC</div>

                <div>
                    <h2>HireConnect</h2>
                    <p>Recruiter Portal</p>
                </div>
            </div>

            <nav class="sidebar-nav">

                <a th:href="@{/recruiter/dashboard}">
                    <i class="fas fa-chart-line"></i>
                    <span>Dashboard</span>
                </a>

                <a th:href="@{/recruiter/jobs}">
                    <i class="fas fa-briefcase"></i>
                    <span>My Jobs</span>
                </a>

                <a th:href="@{/recruiter/jobs/post}" class="active">
                    <i class="fas fa-plus-circle"></i>
                    <span>Post Job</span>
                </a>

                <a th:href="@{/recruiter/applications}">
                    <i class="fas fa-file-lines"></i>
                    <span>Applications</span>
                </a>

                <a th:href="@{/recruiter/interviews}">
                    <i class="fas fa-calendar-check"></i>
                    <span>Interviews</span>
                </a>

                <a th:href="@{/recruiter/subscription}">
                    <i class="fas fa-crown"></i>
                    <span>Subscription</span>
                </a>

            </nav>
        </div>

        <div class="sidebar-bottom">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="logout-btn">
                    <i class="fas fa-right-from-bracket"></i>
                    Logout
                </button>
            </form>
        </div>

    </aside>

    <main class="dashboard-main">

        <header class="page-header">

            <div>
                <span class="welcome-tag">
                    <i class="fas fa-plus-circle"></i>
                    Create New Opportunity
                </span>

                <h1>Post a New Job</h1>

                <p>
                    Write a job post that attracts actual humans and not just LinkedIn motivational bots.
                </p>
            </div>

        </header>

        <section class="form-card large-form-card">

            <form th:action="@{/recruiter/jobs/post}"
                  th:object="${job}"
                  method="post"
                  class="job-form">

                <div class="form-grid">

                    <div class="input-group">
                        <label>Job Title</label>
                        <div class="input-wrapper">
                            <i class="fas fa-briefcase"></i>
                            <input type="text"
                                   th:field="*{title}"
                                   placeholder="e.g. Java Backend Developer"
                                   required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Company Name</label>
                        <div class="input-wrapper">
                            <i class="fas fa-building"></i>
                            <input type="text"
                                   th:field="*{companyName}"
                                   placeholder="e.g. HireConnect Pvt Ltd"
                                   required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Location</label>
                        <div class="input-wrapper">
                            <i class="fas fa-location-dot"></i>
                            <input type="text"
                                   th:field="*{location}"
                                   placeholder="e.g. Bengaluru / Remote"
                                   required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Salary (₹ per annum)</label>
                        <div class="input-wrapper">
                            <i class="fas fa-indian-rupee-sign"></i>
                            <input type="number"
                                   th:field="*{salary}"
                                   placeholder="e.g. 1200000"
                                   min="0"
                                   required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Category</label>
                        <div class="input-wrapper">
                            <i class="fas fa-layer-group"></i>
                            <select th:field="*{category}" required>
                                <option value="">Select Category</option>
                                <option value="Software Development">Software Development</option>
                                <option value="Web Development">Web Development</option>
                                <option value="Data Science">Data Science</option>
                                <option value="UI/UX Design">UI/UX Design</option>
                                <option value="Marketing">Marketing</option>
                                <option value="Sales">Sales</option>
                                <option value="Human Resources">Human Resources</option>
                                <option value="Finance">Finance</option>
                                <option value="Operations">Operations</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Experience Required</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user-clock"></i>
                            <select th:field="*{experience}" required>
                                <option value="">Select Experience</option>
                                <option value="Fresher">Fresher</option>
                                <option value="0-1 Years">0-1 Years</option>
                                <option value="1-3 Years">1-3 Years</option>
                                <option value="3-5 Years">3-5 Years</option>
                                <option value="5-8 Years">5-8 Years</option>
                                <option value="8+ Years">8+ Years</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Employment Type</label>
                        <div class="input-wrapper">
                            <i class="fas fa-business-time"></i>
                            <select th:field="*{employmentType}" required>
                                <option value="">Select Type</option>
                                <option value="FULL_TIME">Full Time</option>
                                <option value="PART_TIME">Part Time</option>
                                <option value="INTERNSHIP">Internship</option>
                                <option value="CONTRACT">Contract</option>
                                <option value="REMOTE">Remote</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Job Status</label>
                        <div class="input-wrapper">
                            <i class="fas fa-toggle-on"></i>
                            <select th:field="*{status}" required>
                                <option value="OPEN">Open</option>
                                <option value="PAUSED">Paused</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-group full-width">
                        <label>Job Description</label>

                        <textarea th:field="*{description}"
                                  rows="10"
                                  placeholder="Describe responsibilities, required skills, perks, expectations, and anything else candidates should know..."
                                  required></textarea>
                    </div>

                </div>

                <div class="form-actions">

                    <a th:href="@{/recruiter/jobs}" class="btn-outline">
                        Cancel
                    </a>

                    <button type="submit" class="btn-primary">
                        <i class="fas fa-paper-plane"></i>
                        Publish Job
                    </button>

                </div>

            </form>

        </section>

    </main>

</div>

</body>
</html>
