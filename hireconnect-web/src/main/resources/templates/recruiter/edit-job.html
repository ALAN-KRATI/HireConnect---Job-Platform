<!-- templates/recruiter/edit-job.html -->
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Job | HireConnect</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="dashboard-page">

<div class="dashboard-layout">

    <aside class="sidebar">

        <div class="sidebar-top">

            <div class="brand-section">
                <div class="logo-circle">HC</div>

                <div>
                    <h2>HireConnect</h2>
                    <p>Recruiter Portal</p>
                </div>
            </div>

            <nav class="sidebar-nav">

                <a th:href="@{/recruiter/dashboard}">
                    <i class="fas fa-chart-line"></i>
                    <span>Dashboard</span>
                </a>

                <a th:href="@{/recruiter/jobs}" class="active">
                    <i class="fas fa-briefcase"></i>
                    <span>My Jobs</span>
                </a>

                <a th:href="@{/recruiter/jobs/post}">
                    <i class="fas fa-plus-circle"></i>
                    <span>Post Job</span>
                </a>

                <a th:href="@{/recruiter/applications}">
                    <i class="fas fa-file-lines"></i>
                    <span>Applications</span>
                </a>

                <a th:href="@{/recruiter/interviews}">
                    <i class="fas fa-calendar-check"></i>
                    <span>Interviews</span>
                </a>

            </nav>
        </div>

        <div class="sidebar-bottom">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="logout-btn">
                    <i class="fas fa-right-from-bracket"></i>
                    Logout
                </button>
            </form>
        </div>

    </aside>

    <main class="dashboard-main">

        <header class="page-header">
            <div>
                <span class="welcome-tag">
                    <i class="fas fa-pen"></i>
                    Edit Listing
                </span>

                <h1>Edit Job</h1>

                <p>
                    Update the details before candidates start wondering what
                    “competitive salary” actually means. Spoiler: they hate it.
                </p>
            </div>

            <a th:href="@{/recruiter/jobs}" class="btn-outline">
                <i class="fas fa-arrow-left"></i>
                Back to Jobs
            </a>
        </header>

        <section class="form-card large-form-card">

            <form th:action="@{'/recruiter/jobs/' + ${job.id} + '/edit'}"
                  th:object="${job}"
                  method="post"
                  class="job-form">

                <div class="form-grid">

                    <div class="input-group">
                        <label>Job Title</label>
                        <div class="input-wrapper">
                            <i class="fas fa-briefcase"></i>
                            <input type="text"
                                   th:field="*{title}"
                                   required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Company Name</label>
                        <div class="input-wrapper">
                            <i class="fas fa-building"></i>
                            <input type="text"
                                   th:field="*{companyName}"
                                   required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Location</label>
                        <div class="input-wrapper">
                            <i class="fas fa-location-dot"></i>
                            <input type="text"
                                   th:field="*{location}"
                                   required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Salary</label>
                        <div class="input-wrapper">
                            <i class="fas fa-indian-rupee-sign"></i>
                            <input type="number"
                                   th:field="*{salary}"
                                   required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Category</label>
                        <div class="input-wrapper">
                            <i class="fas fa-layer-group"></i>
                            <input type="text"
                                   th:field="*{category}"
                                   required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Experience</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user-clock"></i>
                            <input type="text"
                                   th:field="*{experience}"
                                   required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Employment Type</label>
                        <div class="input-wrapper">
                            <i class="fas fa-business-time"></i>
                            <select th:field="*{employmentType}">
                                <option value="FULL_TIME">Full Time</option>
                                <option value="PART_TIME">Part Time</option>
                                <option value="INTERNSHIP">Internship</option>
                                <option value="CONTRACT">Contract</option>
                                <option value="REMOTE">Remote</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Status</label>
                        <div class="input-wrapper">
                            <i class="fas fa-toggle-on"></i>
                            <select th:field="*{status}">
                                <option value="OPEN">Open</option>
                                <option value="PAUSED">Paused</option>
                                <option value="CLOSED">Closed</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-group full-width">
                        <label>Description</label>

                        <textarea th:field="*{description}"
                                  rows="10"
                                  required></textarea>
                    </div>

                </div>

                <div class="form-actions">
                    <a th:href="@{/recruiter/jobs}" class="btn-outline">
                        Cancel
                    </a>

                    <button type="submit" class="btn-primary">
                        <i class="fas fa-floppy-disk"></i>
                        Save Changes
                    </button>
                </div>

            </form>

        </section>

    </main>

</div>

</body>
</html>
