"services:" 
"  api-gateway:" 
"    build: ./api-gateway" 
"    container_name: hireconnect-api-gateway" 
"    restart: always" 
"    ports:" 
"      - \"8080:8080\"" 
"    volumes:" 
"      - ./api-gateway/src/main/resources/application.properties:/app/application.properties:ro" 
"    environment:" 
"      SPRING_APPLICATION_NAME: api-gateway" 
"      SERVER_PORT: 8080" 
"      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/" 
"      EUREKA_INSTANCE_HOSTNAME: api-gateway" 
"      EUREKA_INSTANCE_NON_SECURE_PORT: 8080" 
"      SPRING_CONFIG_IMPORT: file:/app/application.properties" 
"    networks:" 
"      - hireconnect-network" 
